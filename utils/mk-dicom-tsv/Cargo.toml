[package]
name = "mk-dicom-tsv"
description = "Utility to parse DICOM standard XML and produce TSV tag dictionary"
keywords = ["dicom"]

authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true

[[bin]]
name = "mk-dicom-tsv"
path = "mk-dicom-tsv.rs"

[dependencies]
# Provides DICOM tag types used when writing output
dpx-dicom-core = { path = "../../libs/dpx-dicom-core" }
# Parses the DICOM standard's official XML attribute registry (PS3.6)
roxmltree = "0.17"
# CLI argument parsing via derive macros
clap = { version = "4.6", features = [ "derive" ]}
# Ergonomic error handling for this utility (library code uses DicomError instead)
snafu = "0.9.1"
# Logging facade for diagnostic output
log = "0.4"
# Colorized logger controlled by the RUST_LOG environment variable
pretty_env_logger = "0.4"
# Formats current date/time stamped into generated file headers
chrono = "0.4"
# Embeds the current username in generated file headers
whoami = "2.1.2"
