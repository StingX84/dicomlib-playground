[package]
name = "dpx-dicom-core"
description = "Core DICOM library component"
keywords = ["dicom"]
readme = "README.md"

authors.workspace = true
categories.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true

[features]
default = ["serde"]
serde = ["dep:serde"]
unstable = []
static_dictionary = []


[dependencies]

##################
# Required dependencies

# Allows to statically register different types in the static list
inventory = "0.3"

machine-uid = "0.2"

crc32fast = "1.5"

tracing = "0.1"

# dpx-dicom-charset now depends on dpx-dicom-core (inverted dependency)

##################
# Optional dependencies

# Serialization-deserialization framework. One of the core libraries in the rust ecosystem
serde = { version = "1.0", optional = true, features = ["derive"] }


[dev-dependencies]
serde_test = { version = "1.0" }
